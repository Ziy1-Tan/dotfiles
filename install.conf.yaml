- defaults:
    link:
      create: true
      relink: true
    shell:
      quiet: true
      stdout: true
      stderr: true
    create:
      mode: 0755

- clean:
    ~/:
      force: true
    ~/.config:
      recursive: true

- create:
    - ~/.m2
    - ~/.ssh
    - ~/.zsh
    - ~/.vim/plugged
    - ~/.config

- link:
    ~/.zshrc: zshrc
    ~/.zprofile: zprofile
    ~/.ideavimrc: ideavimrc
    ~/.vimrc: vimrc
    ~/.tmux.conf: tmux.conf
    ~/.gitconfig: gitconfig
    ~/.ssh/config: .ssh/config
    ~/.m2/settings.xml: settings.xml
    ~/.wezterm.lua: wezterm.lua
    ~/.config/:
      glob: true
      path: config/*
      relink: true

- shell:
    - description: Installing system dependencies (zsh, curl)
      command: |
        if [ "$(uname)" = "Darwin" ]; then
          if ! command -v brew >/dev/null 2>&1; then
            /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/master/install.sh)"
          fi
          brew install zsh curl 2>/dev/null || true
        elif [ "$(uname)" = "Linux" ]; then
          if ! command -v zsh >/dev/null 2>&1 || ! command -v curl >/dev/null 2>&1; then
            sudo apt-get update && sudo apt-get install -y zsh curl
          fi
          if ! command -v brew >/dev/null 2>&1; then
            /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/master/install.sh)"
          fi
        fi

    - description: Changing default shell to zsh
      command: |
        if [ "$(basename "$SHELL")" = "zsh" ]; then
          echo "Default shell is already zsh"
          exit 0
        fi
        ZSH_PATH="$(command -v zsh)"
        if [ -z "$ZSH_PATH" ]; then
          echo "zsh not found, skipping shell change"
          exit 0
        fi
        echo "Current shell is $SHELL, switching to zsh..."
        if [ "$(uname)" = "Linux" ]; then
          sudo usermod -s "$ZSH_PATH" "$USER"
        else
          sudo chsh -s "$ZSH_PATH" "$USER"
        fi

    - description: Installing miniconda
      command: |
        if command -v conda >/dev/null 2>&1; then
          echo "conda is already installed"
          exit 0
        fi
        if [ "$(uname)" = "Darwin" ]; then
          CONDA_URL="https://repo.anaconda.com/miniconda/Miniconda3-latest-MacOSX-$(uname -m).sh"
        else
          CONDA_URL="https://repo.anaconda.com/miniconda/Miniconda3-latest-Linux-$(uname -m).sh"
        fi
        curl -fsSL "$CONDA_URL" -o /tmp/miniconda.sh
        bash /tmp/miniconda.sh -b -p "$HOME/miniconda3"
        rm /tmp/miniconda.sh
        "$HOME/miniconda3/bin/conda" init zsh

    - [git submodule update --init --recursive, Installing submodules]
    - description: Installing zoxide
      command: |
        if ! command -v zoxide >/dev/null 2>&1; then
          curl -sSfL https://raw.githubusercontent.com/ajeetdsouza/zoxide/main/install.sh | sh
        fi

    - description: Installing fzf
      command: |
        if ! command -v fzf >/dev/null 2>&1; then
          if [ -d ~/.fzf ]; then
            (cd ~/.fzf && git pull --quiet && ./install --no-bash --no-fish)
          else
            git clone --depth 1 https://github.com/junegunn/fzf.git ~/.fzf && (~/.fzf/install --no-bash --no-fish)
          fi
        fi

    - description: Installing vim-plug
      command: |
        if ! command -v vim >/dev/null 2>&1; then
          echo "Vim not found, skipping vim-plug installation"
          exit 0
        fi
        if [ ! -f ~/.vim/autoload/plug.vim ]; then
          mkdir -p ~/.vim/autoload
          curl -fLo ~/.vim/autoload/plug.vim --create-dirs https://raw.githubusercontent.com/junegunn/vim-plug/master/plug.vim
        fi

    - description: Installing zinit
      command: |
        if [ ! -d ~/.local/share/zinit ]; then
          bash -c "$(curl --fail --show-error --silent --location https://raw.githubusercontent.com/zdharma-continuum/zinit/HEAD/scripts/install.sh)"
        else
          echo "zinit is already installed at ~/.local/share/zinit"
        fi
